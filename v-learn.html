<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISA Education - Platform V-LEARN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tryout-frame-container {
            height: calc(100vh - 200px);
            width: 100%;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-[#f0f4f2]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL Web App dari hasil Deploy Google Apps Script Anda
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwJMepe6Jg6Oo3u1s36z8EphxstepV8oHKBEp7B7MHsOxIg88HZQW3Va0fnMOBN1Dbh/exec";
        const logoUrl = "https://cdn.phototourl.com/free/2026-05-01-afe30d6d-f5c0-408f-b08f-587a4e7b39d4.png";
        const bgUrl = "https://i.pinimg.com/736x/ac/30/51/ac3051695f87c3f8cadd1e39a6f51651.jpg";

        function App() {
            const [loginStep, setLoginStep] = useState('login');
            const [voucherCode, setVoucherCode] = useState('');
            const [voucherPass, setVoucherPass] = useState('');
            const [folders, setFolders] = useState([]);
            const [tryOuts, setTryOuts] = useState([]);
            const [selectedFolder, setSelectedFolder] = useState(null);
            const [currentVideo, setCurrentVideo] = useState(null);
            const [activeTryOut, setActiveTryOut] = useState(null);
            const [isTOListActive, setIsTOListActive] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // Fungsi ambil data dari Spreadsheet via GAS
            const fetchContent = async () => {
                try {
                    const res = await fetch(`${GAS_URL}?action=getContent`);
                    const data = await res.json();
                    setFolders(data.folders || []);
                    setTryOuts(data.tryOuts || []);
                } catch (e) {
                    console.error("Gagal memuat data:", e);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const res = await fetch(`${GAS_URL}?action=checkVoucher&code=${voucherCode}&pass=${voucherPass}`);
                    const result = await res.json();
                    if (result.success) {
                        setLoginStep('dashboard');
                        fetchContent();
                    } else {
                        setError("Voucher atau Password Salah!");
                    }
                } catch (err) {
                    setError("Gagal terhubung ke database.");
                } finally {
                    setLoading(false);
                }
            };

            const resetViews = () => {
                setIsTOListActive(false);
                setActiveTryOut(null);
                setSelectedFolder(null);
                setCurrentVideo(null);
                setIsSidebarOpen(false);
            };

            if (loginStep === 'login') {
                return (
                    <div className="min-h-screen relative flex items-center justify-center p-4">
                        <div className="absolute inset-0 z-0 bg-cover bg-center" style={{ backgroundImage: `url(${bgUrl})` }}></div>
                        <div className="absolute inset-0 z-1 bg-white/60 backdrop-blur-md"></div>
                        <div className="max-w-md w-full bg-white/90 glass-morphism rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative z-10">
                            <div className="text-center mb-10">
                                <img src={logoUrl} className="w-20 h-20 mx-auto rounded-2xl shadow-lg mb-6" />
                                <h1 className="text-2xl font-black text-emerald-700 italic uppercase tracking-tight">BISA <span className="text-slate-800">EDUCATION</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-2 tracking-[0.2em] uppercase">V-LEARN PLATFORM</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                {error && <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-[11px] font-bold text-center border border-red-100">{error}</div>}
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Kode Voucher</label>
                                    <input type="text" placeholder="MASUKKAN KODE" className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-center font-mono uppercase outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all" onChange={e => setVoucherCode(e.target.value)} required />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-4 uppercase">Password</label>
                                    <input type="password" placeholder="••••••••" className="w-full p-4 bg-white border border-slate-100 rounded-2xl text-center outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all" onChange={e => setVoucherPass(e.target.value)} required />
                                </div>
                                <button className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-200 hover:bg-emerald-700 hover:-translate-y-1 transition-all active:scale-95 mt-4">
                                    {loading ? <i className="fas fa-circle-notch fa-spin"></i> : "MULAI BELAJAR"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
                    {/* Header Mobile */}
                    <div className="md:hidden flex items-center justify-between p-4 bg-white border-b sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <img src={logoUrl} className="w-8 h-8 rounded-lg" />
                            <span className="font-black text-emerald-800 text-lg italic uppercase">V-LEARN</span>
                        </div>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 text-slate-600">
                            <i className={`fas ${isSidebarOpen ? 'fa-times' : 'fa-bars'} text-xl`}></i>
                        </button>
                    </div>

                    {/* Sidebar Navigation */}
                    <aside className={`fixed inset-0 z-40 bg-white transform transition-transform duration-300 md:relative md:translate-x-0 md:flex md:w-72 md:h-screen md:sticky md:top-0 border-r ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="flex flex-col h-full w-full p-6">
                            <div className="hidden md:flex items-center gap-3 pb-8 border-b">
                                <img src={logoUrl} className="w-10 h-10 rounded-xl shadow-sm" />
                                <span className="font-black text-emerald-800 text-xl italic uppercase tracking-tighter">V-LEARN</span>
                            </div>
                            
                            <nav className="flex-1 space-y-2 mt-8 overflow-y-auto no-scrollbar">
                                <button onClick={resetViews} className={`w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition-all ${(!selectedFolder && !isTOListActive && !activeTryOut) ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-100' : 'text-slate-500 hover:bg-emerald-50'}`}>
                                    <i className="fas fa-home mr-3 w-5 opacity-70"></i> Dashboard
                                </button>
                                
                                {tryOuts.length > 0 && (
                                    <button onClick={() => {setIsTOListActive(true); setActiveTryOut(null); setSelectedFolder(null); setIsSidebarOpen(false);}} className={`w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition-all border ${(isTOListActive || activeTryOut) ? 'bg-amber-500 text-white shadow-lg shadow-amber-100 border-amber-600' : 'text-amber-600 hover:bg-amber-50 border-transparent hover:border-amber-200'}`}>
                                        <i className="fas fa-edit mr-3 w-5 opacity-70"></i> Try Out Online
                                    </button>
                                )}

                                <div className="pt-8 pb-3 px-5 text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Materi Video</div>
                                {folders.map(f => (
                                    <button key={f.id} onClick={() => {setSelectedFolder(f); setCurrentVideo(null); setIsTOListActive(false); setActiveTryOut(null); setIsSidebarOpen(false);}} className={`w-full text-left px-5 py-4 rounded-2xl text-sm transition-all ${selectedFolder?.id === f.id ? 'bg-emerald-50 text-emerald-700 font-bold border border-emerald-100 shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <i className="fas fa-folder mr-3 w-5 opacity-40"></i> {f.name}
                                    </button>
                                ))}
                            </nav>

                            <div className="mt-auto pt-6 border-t text-center">
                                <p className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Powered by BISA Education</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 p-5 md:p-10 overflow-x-hidden">
                        
                        {/* VIEW 1: DAFTAR PAKET TRY OUT */}
                        {isTOListActive && (
                            <div className="max-w-5xl mx-auto">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-black text-slate-800 uppercase italic">Pilih Paket Soal</h2>
                                    <div className="h-1.5 w-20 bg-amber-500 mt-4 rounded-full"></div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {tryOuts.map(to => (
                                        <div key={to.id} onClick={() => {setActiveTryOut(to); setIsTOListActive(false);}} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 card-hover cursor-pointer transition-all group flex flex-col h-full">
                                            <div className="flex justify-between items-start mb-8">
                                                <div className="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center group-hover:bg-amber-500 group-hover:text-white transition-all shadow-sm">
                                                    <i className="fas fa-file-alt text-2xl"></i>
                                                </div>
                                                <span className="text-[10px] font-black bg-slate-100 px-4 py-1.5 rounded-full text-slate-400 uppercase tracking-widest">{to.id}</span>
                                            </div>
                                            <h3 className="font-black text-xl text-slate-800 uppercase italic leading-tight mb-8 flex-1">{to.title}</h3>
                                            <div className="pt-6 border-t border-dashed border-slate-100 flex items-center justify-between">
                                                <span className="text-[11px] font-black text-amber-600 uppercase tracking-wider">Kerjakan Soal</span>
                                                <i className="fas fa-chevron-right text-slate-200 group-hover:text-amber-500 group-hover:translate-x-1 transition-all"></i>
                                            </div>
                                        </div>
                                    ))}
                                    {tryOuts.length === 0 && (
                                        <div className="col-span-full p-20 text-center bg-white rounded-[3rem] border border-dashed border-slate-200">
                                            <i className="fas fa-info-circle text-4xl text-slate-200 mb-4"></i>
                                            <p className="text-slate-400 font-bold uppercase text-xs">Belum ada paket soal yang tersedia</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* VIEW 2: PENGERJAAN TRY OUT (IFRAME) */}
                        {activeTryOut && (
                            <div className="max-w-6xl mx-auto h-full flex flex-col animate-in fade-in duration-500">
                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setIsTOListActive(true)} className="w-12 h-12 bg-white shadow-sm border border-slate-100 rounded-2xl flex items-center justify-center text-slate-400 hover:text-amber-600 hover:border-amber-200 transition-all group">
                                            <i className="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                                        </button>
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800 uppercase italic leading-none">{activeTryOut.title}</h2>
                                            <p className="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">ID Ujian: {activeTryOut.id}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3 px-6 py-3 bg-amber-50 border border-amber-100 rounded-2xl">
                                        <div className="w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(245,158,11,0.5)]"></div>
                                        <span className="text-[11px] font-black text-amber-700 uppercase tracking-wider">Mode Ujian Aktif</span>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[3rem] border border-slate-100 shadow-2xl overflow-hidden flex-1 tryout-frame-container relative ring-8 ring-white/50">
                                    <iframe 
                                        src={activeTryOut.url} 
                                        className="w-full h-full border-none"
                                        title="Simulasi Try Out"
                                    ></iframe>
                                </div>
                                <div className="mt-6 flex items-center justify-center gap-2 text-slate-300">
                                    <i className="fas fa-lock text-[10px]"></i>
                                    <p className="text-[10px] font-black uppercase tracking-[0.2em]">Koneksi Terenkripsi • Jangan Tutup Halaman Ini</p>
                                </div>
                            </div>
                        )}

                        {/* VIEW 3: DASHBOARD UTAMA (FOLDER MATERI) */}
                        {!selectedFolder && !isTOListActive && !activeTryOut && (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex flex-col md:flex-row items-center gap-6 mb-12 p-8 bg-emerald-600 rounded-[3rem] text-white shadow-2xl shadow-emerald-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                                    <div className="w-20 h-20 bg-white/20 backdrop-blur-xl rounded-[2rem] flex items-center justify-center shrink-0 border border-white/30">
                                        <i className="fas fa-graduation-cap text-3xl"></i>
                                    </div>
                                    <div className="text-center md:text-left relative z-10">
                                        <h2 className="text-3xl font-black uppercase italic leading-none">Selamat Datang!</h2>
                                        <p className="text-sm font-semibold opacity-80 mt-2">Siap untuk meningkatkan kemampuanmu hari ini?</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {folders.map(f => (
                                        <div key={f.id} onClick={() => setSelectedFolder(f)} className="bg-white p-8 rounded-[2.5rem] border border-slate-100 card-hover cursor-pointer transition-all group overflow-hidden flex flex-col h-full">
                                            <div className="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-[1.5rem] flex items-center justify-center mb-6 group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-sm">
                                                <i className="fas fa-folder-open text-2xl"></i>
                                            </div>
                                            <h3 className="font-black text-xl uppercase italic text-slate-800 leading-tight mb-3">{f.name}</h3>
                                            <p className="text-xs text-slate-400 font-medium leading-relaxed mb-8 flex-1">{f.description}</p>
                                            <div className="pt-6 border-t border-slate-50 flex items-center justify-between">
                                                <span className="text-[10px] font-black bg-emerald-50 px-4 py-1.5 rounded-full uppercase text-emerald-600 tracking-wider">{f.videos.length} Modul Belajar</span>
                                                <i className="fas fa-arrow-right text-slate-200 group-hover:text-emerald-500 transform transition-all"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW 4: LIST VIDEO DALAM FOLDER */}
                        {selectedFolder && !currentVideo && (
                            <div className="max-w-4xl mx-auto">
                                <button onClick={() => setSelectedFolder(null)} className="group text-emerald-600 font-black text-[11px] mb-10 uppercase flex items-center gap-3 bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm hover:border-emerald-200 transition-all">
                                    <i className="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Dashboard Materi
                                </button>
                                <div className="flex items-center gap-5 mb-12">
                                    <div className="w-16 h-16 bg-emerald-600 text-white rounded-3xl flex items-center justify-center shadow-xl shadow-emerald-100">
                                        <i className="fas fa-book-open text-2xl"></i>
                                    </div>
                                    <h2 className="text-3xl font-black uppercase italic text-slate-800 leading-tight border-l-8 border-emerald-600 pl-6">{selectedFolder.name}</h2>
                                </div>
                                <div className="grid gap-4">
                                    {selectedFolder.videos.map((v) => (
                                        <div key={v.id} onClick={() => setCurrentVideo(v)} className="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center gap-5 hover:border-emerald-500 hover:shadow-xl cursor-pointer transition-all group relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-24 h-full bg-emerald-50/50 skew-x-[-20deg] translate-x-32 group-hover:translate-x-12 transition-transform duration-700"></div>
                                            <div className="w-14 h-14 bg-slate-50 text-emerald-600 rounded-2xl flex items-center justify-center shrink-0 shadow-inner group-hover:bg-emerald-600 group-hover:text-white transition-all duration-500">
                                                <i className="fas fa-play text-sm"></i>
                                            </div>
                                            <div className="flex-1 relative z-10">
                                                <div className="font-black text-sm md:text-base uppercase text-slate-800 leading-none group-hover:text-emerald-700 transition-colors">{v.title}</div>
                                                <div className="text-[10px] text-slate-400 font-bold uppercase mt-2 tracking-widest flex items-center gap-2">
                                                    <i className="fas fa-clock text-[9px]"></i> {v.duration || 'Ready'}
                                                </div>
                                            </div>
                                            <div className="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-200 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition-all duration-500">
                                                <i className="fas fa-chevron-right"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* VIEW 5: VIDEO PLAYER */}
                        {currentVideo && (
                            <div className="max-w-5xl mx-auto pb-20 animate-in slide-in-from-bottom duration-500">
                                <button onClick={() => setCurrentVideo(null)} className="group text-emerald-600 font-black text-[11px] mb-10 uppercase flex items-center gap-3 bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm hover:border-emerald-200 transition-all">
                                    <i className="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Kembali ke Daftar
                                </button>
                                <div className="bg-black rounded-[3rem] overflow-hidden aspect-video relative shadow-2xl border-[12px] border-white ring-1 ring-slate-100">
                                    <iframe src={currentVideo.url} className="w-full h-full absolute inset-0" allowFullScreen></iframe>
                                    {/* Proteksi Klik Kanan (Minimal) */}
                                    <div className="absolute top-0 right-0 w-32 h-20 z-50 bg-transparent"></div>
                                </div>
                                <div className="mt-12 bg-white p-10 md:p-14 rounded-[3.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-emerald-50 rounded-full -mr-20 -mt-20 opacity-50"></div>
                                    <h1 className="text-3xl md:text-4xl font-black uppercase italic text-slate-900 leading-tight relative z-10">{currentVideo.title}</h1>
                                    <div className="mt-8 flex flex-wrap items-center gap-4 relative z-10">
                                        <div className="px-6 py-2.5 bg-slate-900 rounded-2xl text-[10px] font-black text-white uppercase tracking-widest">{selectedFolder.name}</div>
                                        <div className="px-6 py-2.5 bg-emerald-100 rounded-2xl text-[10px] font-black text-emerald-700 uppercase tracking-widest flex items-center gap-2">
                                            <i className="fas fa-check-circle"></i> Materi Terverifikasi
                                        </div>
                                    </div>
                                    <div className="mt-10 p-6 bg-slate-50 rounded-3xl border border-slate-100 flex items-start gap-5">
                                        <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shrink-0 shadow-sm text-emerald-600">
                                            <i className="fas fa-info-circle text-xl"></i>
                                        </div>
                                        <div>
                                            <h4 className="font-black text-xs uppercase text-slate-800 mb-1">Informasi Modul</h4>
                                            <p className="text-[11px] text-slate-400 font-semibold leading-relaxed uppercase">Gunakan headset untuk pengalaman belajar yang maksimal. Anda dapat mengulang video ini kapan saja selama masa aktif voucher masih berlaku.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Overlay Sidebar Mobile */}
                    {isSidebarOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
