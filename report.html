<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Report</title>
<link rel="icon" type="image/png" href="https://iili.io/BiNUvSa.png">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Hide scrollbar but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Scrollbar for Desktop */
        @media (min-width: 1024px) {
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
            ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.4); border-radius: 10px; }
        }

        .animate-fade-up {
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // KONFIGURASI UTAMA
            const GAS_REPORT_URL = "https://script.google.com/macros/s/AKfycbzV7el82rAqlh1JGV7H-B0FYHUoNuU6M8t3gbR08LxVCH4VFiizCqPGHk_QH-ZVaRkEHg/exec";
            const logoUrl = "https://iili.io/BiNUvSa.png";
            const bgImage = "https://static.wixstatic.com/media/24e8f3_56d693f9b5aa4008ad411fe054389c69~mv2.jpg/v1/fill/w_1200,h_800,al_c,q_85/24e8f3_56d693f9b5aa4008ad411fe054389c69~mv2.jpg";

            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [academicData, setAcademicData] = useState([]);
            const [activeTab, setActiveTab] = useState('nilai'); 
            const [loading, setLoading] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                try {
                    const response = await fetch(`${GAS_REPORT_URL}?action=loginSiswa&user=${username}&pass=${password}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        setUser(data.userData);
                        setAcademicData(data.academicData);
                        setIsLoggedIn(true);
                    } else {
                        setError("NIS atau Kata Sandi salah.");
                    }
                } catch (err) {
                    setError("Koneksi gagal. Cek internet Anda.");
                } finally {
                    setLoading(false);
                }
            };

            const subjects = ["Matematika", "B. Indonesia", "B. Inggris"];

            // TAMPILAN LOGIN
            if (!isLoggedIn) {
                return (
                    <div 
                        className="min-h-screen flex items-center justify-center p-4 bg-cover bg-center bg-no-repeat transition-all duration-1000 relative"
                        style={{ backgroundImage: `url(${bgImage})` }}
                    >
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]"></div>

                        <div className="max-w-md w-full glass-panel rounded-[2.5rem] shadow-2xl p-8 md:p-10 animate-fade-up relative z-10 border border-white/20">
                            <div className="text-center mb-8">
                                <div className="bg-white/95 w-24 h-24 mx-auto mb-5 rounded-[2rem] p-4 shadow-xl border border-white/20">
                                    <img src={logoUrl} className="w-full h-full object-contain" alt="Logo" />
                                </div>
                                <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter leading-none">V-REPORT</h1>
                                <p className="text-[10px] font-bold text-emerald-400 mt-2 uppercase tracking-[0.4em] opacity-80">BISA Education Platform</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                {error && (
                                    <div className="flex items-center gap-3 p-4 bg-red-500/20 text-red-100 rounded-2xl text-[11px] font-bold border border-red-500/30 animate-pulse">
                                        <i className="fas fa-exclamation-circle text-lg"></i> {error}
                                    </div>
                                )}
                                
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-white/50 uppercase tracking-widest ml-3">ID SISWA (NIS)</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/30 font-bold text-white placeholder:text-white/20 transition-all text-sm" 
                                        placeholder="Ketik NIS" 
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        required 
                                    />
                                </div>
                                
                                <div className="space-y-1.5">
                                    <label className="text-[10px] font-black text-white/50 uppercase tracking-widest ml-3">KATA SANDI</label>
                                    <input 
                                        type="password" 
                                        className="w-full p-4 bg-white/5 border border-white/10 rounded-2xl outline-none focus:ring-4 focus:ring-emerald-500/30 font-bold text-white placeholder:text-white/20 transition-all text-sm" 
                                        placeholder="••••••••" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        required 
                                    />
                                </div>

                                <button 
                                    disabled={loading}
                                    className="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-5 rounded-2xl shadow-xl shadow-emerald-500/20 transition-all active:scale-95 flex items-center justify-center gap-3 mt-6 uppercase tracking-widest text-xs"
                                >
                                    {loading ? <i className="fas fa-spinner fa-spin text-xl"></i> : "LOGIN DASHBOARD"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // TAMPILAN DASHBOARD
            return (
                <div 
                    className="min-h-screen bg-fixed bg-cover bg-center transition-all duration-1000 relative no-scrollbar"
                    style={{ backgroundImage: `url(${bgImage})` }}
                >
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[1px]"></div>

                    <div className="relative z-10">
                        {/* Glass Header */}
                        <nav className="glass-nav sticky top-0 z-50 px-6 py-4">
                            <div className="max-w-4xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white rounded-xl p-1 shadow-md">
                                        <img src={logoUrl} className="w-8 h-8 object-contain" alt="Logo" />
                                    </div>
                                    <div>
                                        <h2 className="font-black text-white italic uppercase leading-none text-xl tracking-tight">V-REPORT</h2>
                                        <p className="text-[9px] font-black text-emerald-400 uppercase mt-1 tracking-widest italic opacity-80">Academy Center</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => window.location.reload()} 
                                    className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white/40 hover:text-red-400 hover:bg-red-500/10 transition-all border border-white/10"
                                >
                                    <i className="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                        </nav>

                        <main className="max-w-4xl mx-auto p-4 md:p-6 mt-4 pb-24">
                            {/* User Profile Card */}
                            <div className="glass-panel p-6 md:p-8 rounded-[2.5rem] text-white shadow-2xl mb-8 flex flex-col md:flex-row items-center gap-6 relative overflow-hidden group">
                                <div className="absolute -top-12 -right-12 opacity-[0.03] rotate-12 transition-transform duration-1000 group-hover:rotate-45">
                                    <i className="fas fa-graduation-cap text-[220px]"></i>
                                </div>
                                <div className="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center text-slate-900 shadow-2xl z-10 border-4 border-white/10">
                                    <i className="fas fa-user-check text-3xl"></i>
                                </div>
                                <div className="text-center md:text-left z-10 flex-1">
                                    <h3 className="text-3xl font-black uppercase italic tracking-tighter leading-tight">{user?.nama}</h3>
                                    <div className="flex flex-wrap justify-center md:justify-start gap-2 mt-4">
                                        <span className="px-5 py-2 bg-white/5 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10 italic backdrop-blur-md">NIS: {user?.nis}</span>
                                        <span className="px-5 py-2 bg-emerald-500/10 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-500/20 italic backdrop-blur-md text-emerald-300">Kelas: {user?.kelas}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Main Tab Controller */}
                            <div className="flex bg-slate-900/40 backdrop-blur-xl rounded-[2rem] p-1.5 border border-white/10 mb-10 sticky top-24 z-40 shadow-2xl">
                                <button 
                                    onClick={() => setActiveTab('nilai')} 
                                    className={`flex-1 py-4 rounded-[1.6rem] text-xs font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${activeTab === 'nilai' ? 'bg-emerald-500 text-slate-900 shadow-xl' : 'text-white/40 hover:bg-white/5'}`}
                                >
                                    <i className="fas fa-star-half-alt"></i> Nilai Tugas
                                </button>
                                <button 
                                    onClick={() => setActiveTab('kehadiran')} 
                                    className={`flex-1 py-4 rounded-[1.6rem] text-xs font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${activeTab === 'kehadiran' ? 'bg-emerald-500 text-slate-900 shadow-xl' : 'text-white/40 hover:bg-white/5'}`}
                                >
                                    <i className="fas fa-user-clock"></i> Kehadiran
                                </button>
                            </div>

                            {/* Academic List */}
                            <div className="space-y-10">
                                {subjects.map(subject => {
                                    const data = academicData.filter(d => d.mapel === subject);
                                    const accentColor = subject === "Matematika" ? "bg-blue-500" : subject === "B. Indonesia" ? "bg-amber-500" : "bg-red-500";
                                    const accentBorder = subject === "Matematika" ? "border-blue-500/50" : subject === "B. Indonesia" ? "border-amber-500/50" : "border-red-500/50";
                                    
                                    return (
                                        <div key={subject} className={`glass-panel rounded-[2.5rem] shadow-2xl overflow-hidden animate-fade-up border-t-2 ${accentBorder}`}>
                                            {/* Header */}
                                            <div className="p-6 border-b border-white/5 flex items-center justify-between bg-white/5">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-xl ${accentColor} flex items-center justify-center text-white shadow-xl`}>
                                                        <i className="fas fa-book-reader"></i>
                                                    </div>
                                                    <h4 className="font-black text-white uppercase italic tracking-tighter text-lg">{subject}</h4>
                                                </div>
                                                <span className="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] bg-white/5 px-4 py-1.5 rounded-full border border-white/10">
                                                    {data.length} DATA
                                                </span>
                                            </div>
                                            
                                            <div className="p-8">
                                                {activeTab === 'nilai' ? (
                                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-5">
                                                        {data.map((d, i) => (
                                                            <div key={i} className="bg-white/5 p-6 rounded-[2.5rem] text-center border border-white/5 hover:bg-white/10 hover:border-emerald-500/40 transition-all group shadow-sm">
                                                                <p className="text-[9px] font-black text-white/20 uppercase mb-2 tracking-widest group-hover:text-emerald-400">Sesi {d.pertemuan}</p>
                                                                <p className="text-4xl font-black text-white tracking-tighter">{d.nilai}</p>
                                                            </div>
                                                        ))}
                                                        {data.length === 0 && (
                                                            <div className="col-span-full py-10 text-center opacity-30 border-2 border-dashed border-white/10 rounded-3xl">
                                                                <p className="text-white text-[10px] font-black uppercase italic tracking-widest">Data nilai kosong</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        {data.map((d, i) => (
                                                            <div key={i} className="flex items-center justify-between p-5 bg-white/5 rounded-3xl border border-white/5 hover:bg-white/10 transition-all group">
                                                                <div className="flex items-center gap-4">
                                                                    <div className={`w-3 h-3 rounded-full ${d.status === 'Hadir' ? 'bg-emerald-400 shadow-[0_0_12px_rgba(52,211,153,0.6)]' : 'bg-red-400 shadow-[0_0_12px_rgba(248,113,113,0.6)]'} animate-pulse`}></div>
                                                                    <div>
                                                                        <p className="text-[9px] font-black text-white/20 uppercase tracking-widest leading-none mb-1">Pertemuan</p>
                                                                        <p className="text-sm font-black text-white uppercase italic tracking-tight">Sesi Ke-{d.pertemuan}</p>
                                                                    </div>
                                                                </div>
                                                                <div className={`px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest border transition-all ${
                                                                    d.status === 'Hadir' ? 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20' : 
                                                                    d.status === 'Alfa' ? 'bg-red-500/10 text-red-300 border-red-500/20' : 'bg-amber-500/10 text-amber-300 border-amber-500/20'
                                                                }`}>
                                                                    {d.status}
                                                                </div>
                                                            </div>
                                                        ))}
                                                        {data.length === 0 && (
                                                            <div className="col-span-full py-10 text-center opacity-30 border-2 border-dashed border-white/10 rounded-3xl">
                                                                <p className="text-white text-[10px] font-black uppercase italic tracking-widest">Data absensi kosong</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <footer className="mt-24 text-center pb-12">
                                <div className="h-[2px] w-12 bg-emerald-500/30 mx-auto mb-8 rounded-full"></div>
                                <p className="text-[11px] font-black text-white/30 uppercase tracking-[0.8em] italic">Bimbel Bisa Education</p>
                                <p className="text-[9px] font-bold text-emerald-500/20 uppercase tracking-[0.3em] mt-3">Smart Learning Ecosystem • 2024</p>
                            </footer>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
