<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Report</title>
    <link rel="icon" type="image/png" href="https://iili.io/BiNUvSa.png">
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .glass-nav {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const GAS_REPORT_URL = "https://script.google.com/macros/s/AKfycbzV7el82rAqlh1JGV7H-B0FYHUoNuU6M8t3gbR08LxVCH4VFiizCqPGHk_QH-ZVaRkEHg/exec";
            const logoUrl = "https://iili.io/BiNUvSa.png";
            const bgImage = "https://static.wixstatic.com/media/24e8f3_56d693f9b5aa4008ad411fe054389c69~mv2.jpg/v1/fill/w_1200,h_800,al_c,q_85/24e8f3_56d693f9b5aa4008ad411fe054389c69~mv2.jpg";

            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [academicData, setAcademicData] = useState([]);
            const [activeTab, setActiveTab] = useState('nilai'); 
            const [loading, setLoading] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const response = await fetch(`${GAS_REPORT_URL}?action=loginSiswa&user=${username}&pass=${password}`);
                    const data = await response.json();
                    if (data.success) {
                        setUser(data.userData);
                        setAcademicData(data.academicData);
                        setIsLoggedIn(true);
                    } else {
                        setError("NIS atau Kata Sandi salah.");
                    }
                } catch (err) {
                    setError("Koneksi gagal.");
                } finally {
                    setLoading(false);
                }
            };

            const subjects = ["Matematika", "B. Indonesia", "B. Inggris"];

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-5 bg-cover bg-center transition-all relative" style={{ backgroundImage: `url(${bgImage})` }}>
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-[1px]"></div>
                        <div className="max-w-sm w-full glass-panel rounded-[2rem] shadow-2xl p-7 animate-fade-in relative z-10">
                            <div className="text-center mb-6">
                                <div className="bg-white/95 w-16 h-16 mx-auto mb-3 rounded-2xl p-3 shadow-lg">
                                    <img src={logoUrl} className="w-full h-full object-contain" alt="Logo" />
                                </div>
                                <h1 className="text-2xl font-black text-white italic uppercase tracking-tighter">V-REPORT</h1>
                                <p className="text-[8px] font-bold text-emerald-400 mt-1 uppercase tracking-[0.3em] opacity-80">Academy Portal</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-3">
                                {error && <div className="p-3 bg-red-500/20 text-red-100 rounded-xl text-[10px] font-bold border border-red-500/30 text-center">{error}</div>}
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-white/50 uppercase tracking-widest ml-2">NIS</label>
                                    <input type="text" className="w-full p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/30 font-bold text-white text-sm" placeholder="Ketik NIS" value={username} onChange={(e) => setUsername(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-white/50 uppercase tracking-widest ml-2">KATA SANDI</label>
                                    <input type="password" className="w-full p-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/30 font-bold text-white text-sm" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} required />
                                </div>
                                <button disabled={loading} className="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-xl shadow-lg transition-all active:scale-95 text-xs tracking-widest mt-2">
                                    {loading ? <i className="fas fa-spinner fa-spin"></i> : "MASUK"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-fixed bg-cover bg-center relative no-scrollbar" style={{ backgroundImage: `url(${bgImage})` }}>
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[1px]"></div>
                    <div className="relative z-10">
                        <nav className="glass-nav sticky top-0 z-50 px-4 py-3">
                            <div className="max-w-2xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="bg-white rounded-lg p-1">
                                        <img src={logoUrl} className="w-6 h-6 object-contain" />
                                    </div>
                                    <h2 className="font-black text-white italic uppercase text-md tracking-tight leading-none">V-REPORT</h2>
                                </div>
                                <button onClick={() => window.location.reload()} className="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white/40 hover:text-red-400 border border-white/10">
                                    <i className="fas fa-power-off text-xs"></i>
                                </button>
                            </div>
                        </nav>

                        <main className="max-w-2xl mx-auto p-4 pb-20">
                            {/* Profile Compact */}
                            <div className="glass-panel p-4 rounded-[1.5rem] text-white shadow-xl mb-4 flex items-center gap-4 relative overflow-hidden group">
                                <div className="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center text-slate-900 z-10 shrink-0">
                                    <i className="fas fa-user-graduate text-xl"></i>
                                </div>
                                <div className="z-10 flex-1 min-w-0">
                                    <h3 className="text-lg font-black uppercase italic tracking-tighter truncate leading-none">{user?.nama}</h3>
                                    <div className="flex gap-2 mt-1.5">
                                        <span className="px-2 py-0.5 bg-white/5 rounded-md text-[8px] font-bold uppercase tracking-tighter border border-white/10 italic">NIS: {user?.nis}</span>
                                        <span className="px-2 py-0.5 bg-emerald-500/10 rounded-md text-[8px] font-bold uppercase tracking-tighter border border-emerald-500/20 italic text-emerald-300">Kelas: {user?.kelas}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Tab Slim */}
                            <div className="flex bg-slate-900/40 rounded-[1.2rem] p-1 border border-white/10 mb-6 sticky top-16 z-40">
                                <button onClick={() => setActiveTab('nilai')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'nilai' ? 'bg-emerald-500 text-slate-900 shadow-md' : 'text-white/40'}`}>
                                    NILAI TUGAS
                                </button>
                                <button onClick={() => setActiveTab('kehadiran')} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'kehadiran' ? 'bg-emerald-500 text-slate-900 shadow-md' : 'text-white/40'}`}>
                                    KEHADIRAN
                                </button>
                            </div>

                            <div className="space-y-4">
                                {subjects.map(subject => {
                                    const data = academicData.filter(d => d.mapel === subject);
                                    const accentColor = subject === "Matematika" ? "bg-blue-500" : subject === "B. Indonesia" ? "bg-amber-500" : "bg-red-500";
                                    return (
                                        <div key={subject} className="glass-panel rounded-[1.5rem] shadow-lg overflow-hidden animate-fade-in">
                                            <div className="px-4 py-3 border-b border-white/5 flex items-center justify-between bg-white/5">
                                                <div className="flex items-center gap-2">
                                                    <div className={`w-6 h-6 rounded-lg ${accentColor} flex items-center justify-center text-[10px] text-white shadow-md`}>
                                                        <i className="fas fa-book"></i>
                                                    </div>
                                                    <h4 className="font-black text-white uppercase italic tracking-tighter text-sm">{subject}</h4>
                                                </div>
                                                <span className="text-[8px] font-bold text-white/30 tracking-widest">{data.length} DATA</span>
                                            </div>
                                            
                                            <div className="p-4">
                                                {activeTab === 'nilai' ? (
                                                    <div className="grid grid-cols-4 gap-2">
                                                        {data.map((d, i) => (
                                                            <div key={i} className="bg-white/5 p-3 rounded-xl text-center border border-white/5">
                                                                <p className="text-[7px] font-black text-white/20 uppercase mb-0.5">S{d.pertemuan}</p>
                                                                <p className="text-xl font-black text-white leading-tight">{d.nilai}</p>
                                                            </div>
                                                        ))}
                                                        {data.length === 0 && <p className="col-span-full py-2 text-center text-[8px] opacity-20 uppercase tracking-[0.3em]">Kosong</p>}
                                                    </div>
                                                ) : (
                                                    <div className="space-y-1.5">
                                                        {data.map((d, i) => (
                                                            <div key={i} className="flex items-center justify-between p-2.5 bg-white/5 rounded-xl border border-white/5">
                                                                <div className="flex items-center gap-2">
                                                                    <div className={`w-1.5 h-1.5 rounded-full ${d.status === 'Hadir' ? 'bg-emerald-400' : 'bg-red-400'}`}></div>
                                                                    <p className="text-[10px] font-black text-white uppercase italic">Sesi {d.pertemuan}</p>
                                                                </div>
                                                                <div className={`px-2 py-0.5 rounded-md text-[8px] font-black uppercase tracking-tighter border ${d.status === 'Hadir' ? 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20' : 'bg-red-500/10 text-red-300 border-red-500/20'}`}>
                                                                    {d.status}
                                                                </div>
                                                            </div>
                                                        ))}
                                                        {data.length === 0 && <p className="py-2 text-center text-[8px] opacity-20 uppercase tracking-[0.3em]">Kosong</p>}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <footer className="mt-12 text-center pb-8 opacity-20">
                                <p className="text-[8px] font-black text-white uppercase tracking-[0.6em] italic">Bimbel Bisa Education</p>
                            </footer>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
